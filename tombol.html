<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tombol Buka Website Sunda</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,red,yellow,blue);
      font-family: "Trebuchet MS", sans-serif;
    }
    .tombol-sunda{
      text-decoration:none;
      background:#f4a261;
      color:black;
      padding:18px 40px;
      font-size:24px;
      font-weight:bold;
      border-radius:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
      transition:0.3s;
      border:3px solid black;
    }

    .tombol-sunda:hover{
      background:red;
      transform:scale(1.08);
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .ornamen{
      position:absolute;
      bottom:20px;
      color:black;
      font-size:25px;
      letter-spacing:1px;
    }
  </style>
</head>
<body>

  <!-- Tombol buka website -->
  <a class="tombol-sunda" href="index.html" target="_blank">
    KLIK UNTUK MASUK
  </a>

  <!-- Ornamen -->
  <div class="ornamen">
    COCONUTE ✨
  </div>

</body>
</html>
